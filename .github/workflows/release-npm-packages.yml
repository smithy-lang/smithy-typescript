name: release-npm-packages

on:
  push:
    branches:
      - main
  workflow_dispatch: # on button click

jobs:
  release:
    name: Release TypeScript packages to NPM
    # Only publish when the "Version NPM packages" PR is merged into main
    # (or when triggered manually via the Run workflow button).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      startsWith(github.event.head_commit.message, 'Version NPM packages')
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24
          cache: "yarn"
      - name: Install dependencies
        run: yarn install
      - name: Configure AWS Credentials
        id: credentials
        uses: aws-actions/configure-aws-credentials@254c19bd240aabef8777f48595e9d2d7b972184b # v6.2.1
        with:
          aws-region: us-west-2
          role-to-assume: ${{ secrets.JS_TEAM_ROLE_TO_ASSUME }}
          role-session-name: SmithyTypeScriptGitHubRelease
          audience: sts.amazonaws.com
      - name: Stage Release
        id: stage
        run: |
          yarn stage-release --concurrency=1
      - name: Release
        id: release
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        if: steps.stage.outcome == 'success'
        with:
          publish: yarn release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Failure Nofitication
        if: ${{ failure() }}
        run: aws cloudwatch put-metric-data --namespace SmithyTypeScriptPublish --metric-name NpmPackagePublishFailure --value 1
